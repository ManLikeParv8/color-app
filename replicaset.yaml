apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: color-app-replicaset
  labels:
    app: color-app
spec:
  replicas: 3
  selector:
    matchLabels:
      app: color-app
  template:
    metadata:
      labels:
        app: color-app
    spec:
      containers:
      - name: webapp
        image: nortontube/color-app:6f9d762ff2f089c4c44aeaf3e4678f112ab26959
        imagePullPolicy: Always
        ports:
        - containerPort: 80
         
        # 1. The Cable (Inside the container)
        volumeMounts:
        - name: app-storage
          mountPath: /data

      # 2. The Hardware (At the Pod level)
      volumes:
      - name: app-storage
        persistentVolumeClaim:
          claimName: color-app-pvc
