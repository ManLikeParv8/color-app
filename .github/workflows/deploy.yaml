name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and Push Docker Image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: nortontube/color-app:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push 
    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Update Manifest with New Image Tag
      run: |
        sed -i "s|image: .*|image: nortontube/color-app:${{ github.sha }}|g" replicaset.yaml

    - name: Commit and Push Updated YAML to Git
      run: |
        git config --global user.name "GitHub Actions Bot"
        git config --global user.email "actions@github.com"
        git add replicaset.yaml
        git commit -m "🚀 Deploying image version ${{ github.sha }} [skip ci]"
        git push
