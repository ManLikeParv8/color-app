<!DOCTYPE html>
<html>
<head>
    <title>Color Changer App</title>
    <style>
        body { margin: 0; height: 100vh; background-color: lightblue; display: flex; justify-content: center; align-items: center; font-family: sans-serif; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Click anywhere to change my color! 🎨</h1>
    <script>
        const colors = ['lightblue', 'lightcoral', 'lightgreen', 'khaki', 'plum'];
        let index = 0;
        document.body.addEventListener('click', () => {
            index = (index + 1) % colors.length;
            document.body.style.backgroundColor = colors[index];
        });
    </script>
</body>
</html>
